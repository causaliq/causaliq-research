
# Ask LLMs to propose causal graphs, obtain and evaluate optimal graph

matrix:
  network:
  - asia
  - sports
  sample_size:
  - 100
  - 1K
  - 10K
  llm_model:
  - null
  prompt_detail:
  - null

steps:
 - name: "Merge FGES graphs with different seeds"
   uses: "causaliq-analysis"
   with:
     action: "merge_graphs"
     input: papers/pdg-merge/results/fges.db
     output: papers/pdg-merge/results/pdgs.db


 - name: "generate FGES optimal DAG"
   uses: "causaliq-analysis"
   with:
     action: "best_graph"
     threshold: 0.5
     input: papers/pdg-merge/results/pdgs.db


 - name: "evaluate optimal DAG"
   uses: "causaliq-analysis"
   with:
     action: "evaluate_graph"
     reference: networks/{{network}}/{{network}}.xdsl
     input: papers/pdg-merge/results/pdgs.db
     metric: [f1, shd, equiv.f1, equiv.shd]


 - name: "summarise FGES DAGs"
   uses: "causaliq-analysis"
   with:
     action: "summarise"
     input: papers/pdg-merge/results/pdgs.db
     metric: [f1.mean, f1.count, shd.mean, shd.count]
     output: papers/pdg-merge/results/fges-dags.csv