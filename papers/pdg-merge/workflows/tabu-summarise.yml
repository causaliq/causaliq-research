matrix:
  network: [asia]
  sample_size: [100, 1K]

# Summarise the graphs learnt by Tabu

steps:

  - name: "Summarise the Tabu results"
    uses: "causaliq-analysis"
    with:
      action: summarise
      input: "papers/pdg-merge/results/tabu.db"
      output: "papers/pdg-merge/results/tabu.csv"
      metric: [f1.mean, f1.count, f1.sd, shd.count, shd.mean, shd.sd]