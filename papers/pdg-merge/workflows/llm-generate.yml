
# Ask LLMs to propose causal graphs, obtain and evaluate optimal graph

matrix:
  network:
  - asia
  - sports
  llm_model:
  - groq/llama-3.3-70b-versatile # free tier, reliable
  # groq/llama-3.1-8b-instant # budget (truncation issues on sports)
  # groq/mixtral-8x7b-32768 # deprecated
  - gemini/gemini-2.0-flash # budget (2.5-flash has truncation issues)
  # gemini/gemini-2.5-pro # premium
  - openai/gpt-4.1-mini # budget
  # openai/o3-mini # premium
  - anthropic/claude-haiku-4-5-20251001 # budget
  # anthropic/claude-sonnet-4-6 # premium
  - mistral/mistral-small-2603 # budget
  # mistral/mistral-large-2512 # premium
  - deepseek/deepseek-chat # budget
  # deepseek/deepseek-reasoner # premium
  # ollama/llama3.2:1b # poor - too small for JSON generation
  - ollama/qwen3:1.7b # OK @ 6GB (needs beefy GPU)
  # ollama/qwen3.4b # should be OK on desktop with RTX2060
  # ollama/phi4-mini # should be OK on desktop with RTX2060
  use_benchmark_names:
  - false
  - true
  prompt_detail:
  - minimal
  - standard
  - rich
  # llm_temperature:
  # - 0.1



steps:
 - name: "LLM proposes causal PDG"
   uses: "causaliq-knowledge"
   with:
     action: "generate_graph"
     network_context: networks/{{network}}/{{network}}_context.json
     llm_cache: networks/{{network}}/{{network}}_llm.db
     llm_model: "{{llm_model}}"
     use_benchmark_names: "{{use_benchmark_names}}"
     prompt_detail: "{{prompt_detail}}"
     output: papers/pdg-merge/results/llm.db
     