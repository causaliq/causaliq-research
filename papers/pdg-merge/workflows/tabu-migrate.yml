
# Migrate graphs learnt by Tabu from legacy traces to graphml format

matrix:
  network: [asia]
  sample_size: [100, 1k]
  seed: ["0-2"]

steps:
 - name: "Migrate trace to graph"
   uses: "causaliq-analysis"
   with:
     action: "migrate_trace"
     series: "TABU/SAMPLE/BASE"
     network: "{{network}}"
     sample_size: "{{sample_size}}"
     seed: "{{seed}}"
     root_dir: "c:/dev/causaliq/discovery/experiments"
     output: "papers/pdg-merge/results/tabu.db"
