
# Migrate graphs learnt by FGES from legacy traces to graphml format

matrix:
  network: [asia, sports]
  sample_size: [100, 1K, 10K]
  seed: ["0-24"]

steps:
 - name: "Migrate trace to graph"
   uses: "causaliq-analysis"
   with:
     action: "migrate_trace"
     series: "TETRAD/FGES_BASE4"
     network: "{{network}}"
     sample_size: "{{sample_size}}"
     seed: "{{seed}}"
     root_dir: "c:/dev/causaliq/discovery/experiments"
     output: "papers/pdg-merge/results/fges.db"

 - name: "Evaluate graph learnt by FGES"
   uses: "causaliq-analysis"
   with:
     action: evaluate_graph
     reference: networks/{{network}}/{{network}}.xdsl
     input: "papers/pdg-merge/results/fges.db"
     metric: [equiv.f1, equiv.shd]


 - name: "List individual FGES results"
   uses: "causaliq-analysis"
   with:
     action: summarise
     input: "papers/pdg-merge/results/fges.db"
     output: "papers/pdg-merge/results/fges.csv"
     metric: [equiv.f1.mean, equiv.shd.mean]