matrix:
  network: [asia, sports]
  sample_size: [100, 1K, 10k]

# Summarise the graphs learnt by Tabu

steps:

  - name: "Summarise the FGES results"
    uses: "causaliq-analysis"
    with:
      action: summarise
      input: "papers/pdg-merge/results/fges.db"
      output: "papers/pdg-merge/results/fges-summarise.csv"
      metric: [equiv.f1.mean, equiv.f1.sd, equiv.shd.mean, equiv.shd.sd, equiv.f1.count]